<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON THUMB PRO | AI SUITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #ff0050; }
        body { background: #080808; color: white; font-family: 'Inter', sans-serif; }
        .cyber-panel { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 0, 80, 0.2); backdrop-filter: blur(10px); }
        .neon-btn { background: var(--neon); box-shadow: 0 0 20px rgba(255, 0, 80, 0.4); }
        .neon-btn:hover { box-shadow: 0 0 35px var(--neon); transform: translateY(-2px); }
        canvas { cursor: crosshair; touch-action: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 cyber-panel border-b border-white/10 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter text-white">THUMBNAIL<span class="text-[#ff0050]">PRO</span></h1>
        <div class="text-[10px] tracking-[0.4em] text-zinc-500 font-bold">AI VIDEO CLEANER v3.0</div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-5xl">
        <div class="cyber-panel rounded-[2.5rem] p-8 relative overflow-hidden">
            
            <div id="dropZone" class="relative rounded-3xl overflow-hidden bg-black aspect-video flex items-center justify-center border border-white/5 shadow-2xl">
                <input type="file" id="mediaInput" class="hidden" accept="video/*,image/*">
                
                <label for="mediaInput" id="labelUI" class="text-center cursor-pointer group">
                    <div class="w-24 h-24 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-all border border-white/10">
                        <svg class="w-10 h-10 text-[#ff0050]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                    <p class="font-black text-2xl tracking-tighter">UPLOAD VIDEO</p>
                    <p class="text-zinc-500 text-xs mt-2 uppercase tracking-widest">Multiple Watermark Support</p>
                </label>

                <video id="mainVideo" class="hidden w-full h-full object-contain" loop></video>
                <canvas id="maskCanvas" class="absolute top-0 left-0 w-full h-full hidden"></canvas>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-8">
                <button onclick="autoScan()" class="py-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 font-black text-sm tracking-widest transition-all">AUTO SCAN AI</button>
                <button id="renderBtn" class="neon-btn py-4 rounded-2xl font-black text-black text-xl italic tracking-tighter transition-all">PRO REMOVE</button>
                <button onclick="resetAll()" class="py-4 rounded-2xl bg-zinc-900 border border-white/5 hover:border-red-500/50 text-xs font-bold transition-all uppercase">Reset Engine</button>
            </div>
        </div>
    </main>

    <footer class="py-16 bg-black border-t border-white/5">
        <div class="text-center">
            <p class="text-[9px] tracking-[0.8em] text-zinc-600 uppercase mb-4">Core Technology by</p>
            <h2 class="text-6xl font-black italic tracking-tighter text-white opacity-80">
                ASH<span class="text-transparent bg-clip-text bg-gradient-to-r from-[#ff0050] to-[#bc13fe]">ISH</span>
            </h2>
            <div class="mt-10 flex justify-center gap-10 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                <span>Browser Based</span>
                <span>4K Support</span>
                <span>Zero Latency</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
