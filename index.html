<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON THUMB PRO | AI VIDEO SUITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff0050; --glass: rgba(255, 255, 255, 0.03); }
        body { background-color: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .cyber-border { border: 1px solid rgba(255, 0, 80, 0.3); box-shadow: 0 0 20px rgba(255, 0, 80, 0.1); }
        .neon-text { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: 2px; color: var(--neon-red); text-shadow: 0 0 15px var(--neon-red); }
        .glass-panel { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        canvas { cursor: crosshair; }
        .btn-neon { background: var(--neon-red); box-shadow: 0 0 20px rgba(255, 0, 80, 0.4); transition: 0.3s; }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 35px var(--neon-red); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 border-b border-white/5 flex justify-between items-center glass-panel">
        <h1 class="text-2xl neon-text">THUMBNAIL PRO</h1>
        <div class="hidden md:block text-[10px] tracking-[0.4em] text-zinc-500">ADVANCED VIDEO FORENSICS V2.0</div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-5xl">
        <div class="glass-panel rounded-[2rem] p-8 cyber-border relative overflow-hidden">
            <div class="flex flex-col gap-8">
                
                <div id="engine-container" class="relative rounded-3xl overflow-hidden bg-black aspect-video flex items-center justify-center border border-white/10 shadow-2xl">
                    <input type="file" id="mediaUpload" class="hidden" accept="video/*,image/*">
                    
                    <label for="mediaUpload" id="upload-ui" class="text-center cursor-pointer group">
                        <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-red-500/20 transition-all border border-white/10">
                            <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                        </div>
                        <p class="font-black text-xl tracking-tight">DRAG & DROP MEDIA</p>
                        <p class="text-zinc-500 text-xs mt-2">AUTO AI DETECTION READY</p>
                    </label>

                    <video id="mainPlayer" class="hidden w-full h-full object-contain"></video>
                    <canvas id="aiCanvas" class="absolute top-0 left-0 w-full h-full hidden pointer-events-auto"></canvas>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-zinc-500 uppercase tracking-widest">AI Detection</h3>
                        <button onclick="autoDetectText()" class="w-full py-4 rounded-2xl border border-white/10 bg-white/5 hover:bg-white/10 font-bold transition-all flex items-center justify-center gap-3">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> AUTO SCAN TEXT
                        </button>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-zinc-500 uppercase tracking-widest">Processing</h3>
                        <button id="processBtn" class="w-full btn-neon py-4 rounded-2xl font-black text-black italic tracking-tighter text-lg">RE-RENDER HD</button>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-xs font-black text-zinc-500 uppercase tracking-widest">Management</h3>
                        <div class="flex gap-2">
                            <button onclick="clearMasks()" class="flex-1 py-4 rounded-2xl bg-zinc-900 border border-white/5 hover:border-red-500/50 transition-all text-xs font-bold uppercase">Clear All</button>
                            <button id="downloadBtn" class="flex-1 py-4 rounded-2xl bg-cyan-900/20 border border-cyan-500/30 text-cyan-400 text-xs font-bold uppercase">Export 4K</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-16 glass-panel mt-20 relative border-t border-white/5">
        <div class="text-center">
            <p class="text-[9px] tracking-[0.8em] text-zinc-600 uppercase mb-4">Core Algorithm by</p>
            <h2 class="text-6xl font-black italic tracking-tighter text-white opacity-90 leading-none">
                ASH<span class="text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-purple-600">ISH</span>
            </h2>
            <div class="mt-8 flex justify-center gap-8 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                <span class="hover:text-red-500 cursor-pointer transition-all">No-Login</span>
                <span class="hover:text-red-500 cursor-pointer transition-all">Browser-Based AI</span>
                <span class="hover:text-red-500 cursor-pointer transition-all">Real HD</span>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
